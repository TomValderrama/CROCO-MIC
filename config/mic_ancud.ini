# =============================================================================
# CROCO pytools configuration — Mar Interior de Chiloé (MIC / Gulf of Ancud)
# Simulations: verano 2020-11 to 2021-03 | invierno 2021-04 to 2021-08
# Grid: 605x505 rho points, 42 sigma levels
# =============================================================================

[Croco_Files]
croco_files_dir = /mnt/d/ProyectoMsc_CROCO/01_inputs/croco_files
croco_grd_prefix = croco_grd
croco_tide_prefix = croco_frc
croco_ini_prefix = croco_ini
croco_bry_prefix = croco_bry
croco_bry_format = MONTHLY
croco_rivers_prefix = croco_runoff

[Zoom_Options]
is_zoom = False
is_agrif = False
agrif_level = 0
parent_grid = /mnt/d/ProyectoMsc_CROCO/01_inputs/croco_files/croco_grd.nc

# Grid_Position not used — existing grid file (roms_MIC_grd_v9g.nc) is used via croco_grd_prefix
[Grid_Position]
central_lon = -75.5
central_lat = -44.0
size_x_km = 770
size_y_km = 665
npoints_x = 505
npoints_y = 603
grid_angle = 0.0

[Grid_Zoom_Params]
north_obc = True
south_obc = True
west_obc = True
east_obc = False

[Grid_Smoothing_Params]
hmin = 5.0
hmax = 5000.0
interp_rad = 2
rfact = 0.2
smooth_meth = lsmooth

[Grid_Isolated_Waterbodies]
mask_isolated_waterbodies = False
main_water_body_x_idx = 250
main_water_body_y_idx = 300

[Grid_Input_Files]
topo_file_reader = gebco
topo_file = /mnt/d/ProyectoMsc_CROCO/01_inputs/grid/GEBCO_2023.nc
shp_file = /mnt/d/ProyectoMsc_CROCO/01_inputs/grid/GSHHS_f_L1.shp

# =============================================================================
# Times — covers both experiments (verano + invierno)
# Ystart/Mstart = first month of verano spinup
# Yend/Mend     = last month of invierno analysis
# =============================================================================
[Times]
Ystart = 2020
Mstart = 11
Dstart = 1
Hstart = 0
Yend = 2021
Mend = 8
Dend = 31
Hend = 0
Yorig = 2000
Morig = 1
Dorig = 1
Horig = 0
use_calendar = False

[Sigma_Params]
theta_s = 7
theta_b = 2
N = 42
hc = 200

# =============================================================================
# IBC — GLORYS12 (CMEMS reanalysis, 0.083 deg)
# Open boundaries: West, North, South (East is land)
# =============================================================================
[IBC_Options]
obc_dict = {'south':1, 'north':1, 'west':1, 'east':0}
tracers = ["temp", "salt"]
uv_conserv = 1
min_nb_valid_data = 4

[IBC_Input_Files]
ibc_reader = mercator
ibc_dir = /mnt/d/ProyectoMsc_CROCO/01_inputs/glorys_raw
ibc_prefix = glorys
ibc_extension = .nc
ibc_freq = 1M
ibc_multi_files = False
ibc_file_ssh = zos
ibc_files_tracers = ["thetao", "so"]
ibc_file_u = uo
ibc_file_v = vo
ini_filedate = 202011
ini_idx = 0

# =============================================================================
# Tides — TPXO10 atlas v2 (8 primary components)
# =============================================================================
[Tide_Options]
tide_waves = M2,S2,N2,K2,K1,O1,P1,Q1
is_tide_current = True
is_tide_potential = True
is_correction_ssh = True
is_correction_uv = True

[Tide_Input_Files]
tide_reader = tpxo10
tide_type = Re_Im
tide_dir = /mnt/d/ProyectoMsc_CROCO/01_inputs/tides/TPXO10_atlas_v2_nc/MIC/
tide_single_file = grid_tpxo10atlas_v2.nc
tide_multi_files = True
tide_multi_files_waves_separated = True
tide_multi_files_elev_file = h_<tide_wave>_tpxo10_atlas_30_v2.nc
tide_multi_files_u_file = u_<tide_wave>_tpxo10_atlas_30_v2.nc
tide_multi_files_v_file = u_<tide_wave>_tpxo10_atlas_30_v2.nc

# =============================================================================
# Rivers — Dai & Trenberth climatological runoff (processed separately)
# See: 04_analisis/python/preprocessing/make_runoff.py
# =============================================================================
[Rivers_Options]
nb_iter_mask = 3
rivers_freq = MONTHLY

[Rivers_Input_Files]
rivers_file_list = Examples/rivers_list.txt

[Download_Options]
use_grd_extent = True
grd_extent_padding = 1.0
custom_extent = None

[Mercator_Download]
dataset = cmems_mod_glo_phy_my_0.083deg_P1D-m
variables = ['thetao', 'so', 'uo', 'vo', 'zos']
depths = [0, 50]

[ERA5_Download]
era5_dir = /mnt/d/ProyectoMsc_CROCO/01_inputs/forcing/era5_raw/
n_overlap = 0
time_frames = 00/03/06/09/12/15/18/21
variables = ['msl', 'sst', 'tp', 'strd', 'ssrd', 't2m', 'd2m', 'u10', 'v10']
conv_cff  = [1., 1., 1000./3600., 1./3600., 1./3600., 1., 1., 1., 1.]
units = ['Pa', 'K', 'kg m-2 s-1', 'W m-2', 'W m-2', 'K', 'K', 'm s-1', 'm s-1']
wave_extract = False
